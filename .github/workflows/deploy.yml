name: Build and deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase)
        id: image
        run: |
          r=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lower=$r" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}:${{ github.sha }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            test -n "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            printf 'ZAGLE_IMAGE=%s\n' "${{ env.REGISTRY }}/${{ steps.image.outputs.lower }}:${{ github.sha }}" > .env
            docker compose pull
            docker compose up -d
